<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rentora - Owner dashboard</title>
<link rel="stylesheet" href="../css/style.css">
</head>
<body class="app-body">

<div class="topnav">
  <div class="nav-logo"><div class="logo-badge">R</div> Rentora</div>
  <div class="nav-links">
    <a class="nav-link active" href="owner.html">My properties</a>
  </div>
  <button class="nav-logout" onclick="logout()">Log out</button>
</div>

<div class="page-wrap">
  <h1 class="page-title">Owner dashboard</h1>
  <p class="page-sub">Manage properties, rooms, and booking requests</p>

  <p class="section-title">Add a property</p>
  <div class="filters-bar">
    <input id="propName" type="text" placeholder="Property name">
    <input id="propCity" type="text" placeholder="City">
    <input id="propAddress" type="text" placeholder="Address">
    <input id="propAmenities" type="text" placeholder="Amenities (optional)">
    <button class="btn-primary" style="width:auto;padding:10px 18px" onclick="addProperty()">Add property</button>
  </div>

  <p class="section-title">My properties</p>
  <div id="propertyList" class="card-grid"></div>

  <p class="section-title">Booking requests</p>
  <div id="bookingList"></div>

  <p class="status-msg" id="statusMsg"></p>
</div>

<script src="../js/api.js"></script>
<script>
  requireAuth();
  const token = getToken();

  function showStatus(message, type) {
    const el = document.getElementById('statusMsg');
    el.textContent = message;
    el.className = 'status-msg show ' + type;
  }

  async function addProperty() {
    const name = document.getElementById('propName').value.trim();
    const city = document.getElementById('propCity').value.trim();
    const address = document.getElementById('propAddress').value.trim();
    const amenities = document.getElementById('propAmenities').value.trim();

    if (!name || !city || !address) {
      showStatus('Name, city and address are required.', 'error');
      return;
    }

    try {
      await apiPost('/owner/properties', { name: name, city: city, address: address, amenities: amenities || null }, token);
      showStatus('Property added!', 'success');
      document.getElementById('propName').value = '';
      document.getElementById('propCity').value = '';
      document.getElementById('propAddress').value = '';
      document.getElementById('propAmenities').value = '';
      loadProperties();
    } catch (err) {
      showStatus('Could not add property. Make sure you are logged in as an owner.', 'error');
    }
  }

  async function loadProperties() {
    const list = document.getElementById('propertyList');
    try {
      const properties = await apiGet('/owner/properties', token);
      if (!properties.length) {
        list.innerHTML =
          '<div class="empty-state">' +
          '<div class="empty-state-icon"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21h18M6 21V7l6-4 6 4v14M10 21v-6h4v6"></path></svg></div>' +
          '<p class="empty-state-title">No properties yet</p>' +
          '<p class="empty-state-sub">Add your first property using the form above.</p>' +
          '</div>';
        return;
      }
      list.innerHTML = properties.map(function (p) {
        return '<div class="room-card">' +
          '<h3>' + p.name + '</h3>' +
          '<p class="room-meta">' + p.address + ', ' + p.city + '</p>' +
          '<button class="btn-secondary btn-small" onclick="addRoom(' + p.id + ')">Add a room</button>' +
          '</div>';
      }).join('');
    } catch (err) {
      list.innerHTML = '<div class="empty-state"><p class="empty-state-title">Could not load properties</p></div>';
    }
  }

  async function addRoom(propertyId) {
    const rentStr = prompt('Monthly rent for this room (Rs)?');
    if (!rentStr) return;
    const rent = parseFloat(rentStr);
    if (isNaN(rent)) {
      showStatus('Enter a valid rent amount.', 'error');
      return;
    }
    try {
      await apiPost('/owner/properties/' + propertyId + '/rooms', {
        room_type: 'double',
        bed_count: 1,
        rent_amount: rent,
      }, token);
      showStatus('Room added!', 'success');
    } catch (err) {
      showStatus('Could not add room.', 'error');
    }
  }

  async function loadBookings() {
    const list = document.getElementById('bookingList');
    try {
      const bookings = await apiGet('/owner/bookings', token);
      if (!bookings.length) {
        list.innerHTML =
          '<div class="empty-state">' +
          '<div class="empty-state-icon"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 8v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8"></path><path d="m3 8 2.7-4.5A2 2 0 0 1 7.4 2.5h9.2a2 2 0 0 1 1.7 1L21 8"></path><path d="M3 8h18M9 12h6"></path></svg></div>' +
          '<p class="empty-state-title">No booking requests yet</p>' +
          '<p class="empty-state-sub">When a tenant books one of your rooms, it will show up here.</p>' +
          '</div>';
        return;
      }
      list.innerHTML = bookings.map(function (b) {
        const action = b.status === 'requested'
          ? '<button class="btn-secondary btn-small" onclick="confirmBooking(' + b.id + ')">Confirm</button>'
          : '';
        return '<div class="booking-row">' +
          '<div><strong>Room #' + b.room_id + '</strong> · Tenant #' + b.tenant_id +
          '<p class="room-meta" style="margin:2px 0 0">Requested ' + new Date(b.created_at).toLocaleDateString() + '</p></div>' +
          '<div style="text-align:right">' +
          '<span class="status-tag ' + b.status + '" style="margin-right:10px">' + b.status + '</span>' +
          action +
          '</div></div>';
      }).join('');
    } catch (err) {
      list.innerHTML = '<div class="empty-state"><p class="empty-state-title">Could not load bookings</p></div>';
    }
  }

  async function confirmBooking(bookingId) {
    try {
      await apiPatch('/owner/bookings/' + bookingId, { status: 'confirmed' }, token);
      showStatus('Booking confirmed!', 'success');
      loadBookings();
    } catch (err) {
      showStatus('Could not confirm booking.', 'error');
    }
  }

  loadProperties();
  loadBookings();
</script>
</body>
</html>
